name: post_publish

on:
  release:
    types: [published]

jobs:
  update-dl-version:
    name: update dl.deno.land version
    runs-on: ubuntu-latest
    if: github.repository == 'denoland/deno'
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: denoland
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          export_environment_variables: true
          create_credentials_file: true

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: denoland

      - name: Upload version file to dl.deno.land
        env:
          AWS_ACCESS_KEY_ID: ${{ vars.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL_S3: ${{ vars.S3_ENDPOINT }}
          AWS_DEFAULT_REGION: ${{vars.S3_REGION }}
        run: |
          VERSION=${GITHUB_REF#refs/*/}
          if [[ "$VERSION" == *"-alpha."* ]]; then
            LATEST_FILE="release-alpha-latest.txt"
          elif [[ "$VERSION" == *"-beta."* ]]; then
            LATEST_FILE="release-beta-latest.txt"
          else
            LATEST_FILE="release-latest.txt"
          fi
          echo "$VERSION" > "$LATEST_FILE"
          if [[ "$LATEST_FILE" == "release-latest.txt" ]]; then
            (deno run --allow-net tools/release/version_greater_latest.ts "$VERSION" || exit 0) && gsutil -h "Cache-Control: no-cache" cp "$LATEST_FILE" "gs://dl.deno.land/$LATEST_FILE" && aws s3 cp "$LATEST_FILE" "s3://dl-deno-land/$LATEST_FILE"
          else
            gsutil -h "Cache-Control: no-cache" cp "$LATEST_FILE" "gs://dl.deno.land/$LATEST_FILE" && aws s3 cp "$LATEST_FILE" "s3://dl-deno-land/$LATEST_FILE"
          fi
