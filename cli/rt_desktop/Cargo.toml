[package]
name = "denort_desktop"
version = "2.7.4"
authors.workspace = true
edition.workspace = true
license.workspace = true
publish = false
repository.workspace = true
description = "Provides libdenort shared library for laufey desktop apps"

[lib]
name = "denort"
path = "lib.rs"
crate-type = ["cdylib"]

[build-dependencies]
deno_runtime.workspace = true
deno_core.workspace = true

[dependencies]
deno_core.workspace = true
deno_error.workspace = true
deno_lib.workspace = true
deno_net.workspace = true
deno_runtime.workspace = true
deno_snapshots.workspace = true
deno_terminal.workspace = true
denort = { path = "../rt" }
# Local checkout: the in-process scheme handler transport requires laufey API
# version 26 (register_scheme_handler), unreleased as of laufey 0.3.2.
laufey = { path = "../../../wef/capi" }
libsui.workspace = true

bytes.workspace = true
http-body-util.workspace = true
hyper.workspace = true
hyper-util.workspace = true
log = { workspace = true, features = ["serde"] }
raw-window-handle.workspace = true
rustls.workspace = true
serde_json.workspace = true
tokio.workspace = true

[dev-dependencies]
tempfile.workspace = true
