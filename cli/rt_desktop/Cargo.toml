[package]
name = "denort_desktop"
version = "2.7.4"
authors.workspace = true
edition.workspace = true
license.workspace = true
publish = false
repository.workspace = true
description = "Provides libdenort shared library for laufey desktop apps"

[lib]
name = "denort"
path = "lib.rs"
# cdylib: the loadable `libdenort` used by the desktop backends (dlopen).
# lib: lets `deno_ios_app` link the runtime statically (iOS forbids dlopen).
crate-type = ["cdylib", "lib"]

[build-dependencies]
cc = "1"
deno_runtime.workspace = true
deno_core.workspace = true

[dependencies]
deno_core.workspace = true
deno_error.workspace = true
deno_lib.workspace = true
# `transpile` enables the runtime extension transpiler (deno_ast). Needed on
# iOS, which boots cold from source (no snapshot) and so must transpile the
# TypeScript extension modules at startup instead of at snapshot-build time.
deno_runtime = { workspace = true, features = ["transpile"] }
deno_snapshots.workspace = true
deno_terminal.workspace = true
denort = { path = "../rt" }
laufey = "0.5.0"
libsui.workspace = true

log = { workspace = true, features = ["serde"] }
raw-window-handle.workspace = true
rustls.workspace = true
serde_json.workspace = true
tokio.workspace = true

[dev-dependencies]
tempfile.workspace = true
