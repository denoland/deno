# Pinned SHA-256 digests for WEF backend archives.
#
# This file is the trust anchor for `deno desktop` backend downloads. Each
# entry pins the digest of an archive published at:
#   https://github.com/littledivy/just-wef/releases/download/v<WEF_VERSION>/<file>
# `WEF_VERSION` comes from the workspace `Cargo.lock` (the `just-wef` crate).
# When that version bumps, regenerate this file from the upstream
# `SHA256SUMS` and verify the digests against the release out-of-band before
# committing — this is what removes the TOFU on the unsigned SHA256SUMS.
#
# Format: GNU `sha256sum` style, one `<hex>  <filename>` per line.
# A `# version: vX.Y.Z` directive (optional) is matched against WEF_VERSION
# at build time to guard against forgetting to refresh this file.
#
# version: v0.1.0

