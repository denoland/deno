[package]
name = "deno_telemetry"
version = "0.74.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
readme = "README.md"
repository.workspace = true
description = "Telemetry for Deno"

[lib]
path = "lib.rs"

[dependencies]
async-trait.workspace = true
deno_core.workspace = true
deno_error.workspace = true
deno_net.workspace = true
deno_signals.workspace = true
deno_terminal.workspace = true
deno_tls.workspace = true
flate2 = { workspace = true, features = ["default"] }
http-body-util.workspace = true
hyper.workspace = true
hyper-rustls.workspace = true
hyper-util.workspace = true
log.workspace = true
once_cell.workspace = true
opentelemetry.workspace = true
opentelemetry-http.workspace = true
opentelemetry-otlp.workspace = true
opentelemetry-proto.workspace = true
opentelemetry-semantic-conventions.workspace = true
opentelemetry_sdk.workspace = true
pin-project.workspace = true
# opentelemetry-proto 0.32 uses prost 0.14, which is newer than the workspace
# prost (0.13) still used by deno_kv, so depend on 0.14 directly here so the
# `prost::Message` bound in the gRPC framing matches the generated proto types.
prost = "0.14"
serde.workspace = true
sys_traits.workspace = true
thiserror.workspace = true
tokio.workspace = true
tower-service.workspace = true

[target.'cfg(any(target_os = "android", target_os = "linux", target_os = "macos"))'.dependencies]
tokio-vsock.workspace = true
