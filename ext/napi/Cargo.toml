[package]
name = "deno_napi"
version = "0.178.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
readme = "README.md"
repository.workspace = true
description = "NAPI implementation for Deno"

[lib]
path = "lib.rs"


[features]
default = ["v8-engine"]
v8-engine = ["deno_core/v8-engine"]
quickjs = ["deno_core/quickjs", "qjs_v8_compat/link_quickjs"]

[dependencies]
deno_core.workspace = true
qjs_v8_compat = { workspace = true, optional = true }
deno_error.workspace = true
deno_permissions.workspace = true
denort_helper.workspace = true
libc.workspace = true
libloading.workspace = true
log.workspace = true
napi_sym.workspace = true
thiserror.workspace = true

[target.'cfg(windows)'.dependencies]
windows-sys.workspace = true

[dev-dependencies]
libuv-sys-lite.workspace = true
