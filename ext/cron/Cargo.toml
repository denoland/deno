[package]
name = "deno_cron"
version = "0.127.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
readme = "README.md"
repository.workspace = true
description = "Implementation of the Deno cron API"

[lib]
path = "lib.rs"


[features]
default = ["v8-engine"]
v8-engine = ["deno_core/v8-engine"]
quickjs = ["deno_core/quickjs", "qjs_v8_compat/link_quickjs"]

[dependencies]
async-trait.workspace = true
chrono = { workspace = true, features = ["now"] }
deno_core.workspace = true
qjs_v8_compat = { workspace = true, optional = true }
deno_error.workspace = true
deno_features.workspace = true
once_cell.workspace = true
saffron.workspace = true
serde = { workspace = true, features = ["derive"] }
thiserror.workspace = true
tokio.workspace = true

[target.'cfg(any(target_os = "android", target_os = "linux", target_os = "macos"))'.dependencies]
tokio-vsock.workspace = true
