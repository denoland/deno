[package]
name = "deno_webidl"
version = "0.247.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
readme = "README.md"
repository.workspace = true
description = "WebIDL implementation for Deno"

[lib]
path = "lib.rs"


[features]
default = ["v8-engine"]
v8-engine = ["deno_core/v8-engine"]
quickjs = ["deno_core/quickjs", "qjs_v8_compat/link_quickjs"]

[dependencies]
deno_core.workspace = true
qjs_v8_compat = { workspace = true, optional = true }

[dev-dependencies]
deno_bench_util.workspace = true

[[bench]]
name = "dict"
harness = false
