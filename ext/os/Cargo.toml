[package]
name = "deno_os"
version = "0.64.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
readme = "README.md"
repository.workspace = true
description = "OS specific APIs for Deno"

[lib]
path = "lib.rs"


[features]
default = ["v8-engine"]
v8-engine = ["deno_core/v8-engine"]
quickjs = ["deno_core/quickjs", "qjs_v8_compat/link_quickjs"]

[dependencies]
deno_core.workspace = true
qjs_v8_compat = { workspace = true, optional = true }
deno_error.workspace = true
deno_path_util.workspace = true
deno_permissions.workspace = true
deno_signals.workspace = true
libc.workspace = true
netif.workspace = true
once_cell.workspace = true
serde.workspace = true
thiserror.workspace = true
tokio.workspace = true

[target.'cfg(windows)'.dependencies]
winapi = { workspace = true, features = ["commapi", "knownfolders", "mswsock", "objbase", "psapi", "shlobj", "sysinfoapi", "tlhelp32", "winbase", "winerror", "winuser", "winsock2"] }
ntapi = "0.4.0"
