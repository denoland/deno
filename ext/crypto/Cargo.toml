[package]
name = "deno_crypto"
version = "0.265.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
readme = "README.md"
repository.workspace = true
description = "Web Cryptography API implementation for Deno"

[lib]
path = "lib.rs"

[dependencies]
aes.workspace = true
aes-gcm.workspace = true
aes-kw = { workspace = true, features = ["alloc"] }
argon2.workspace = true
aws-lc-rs = { workspace = true, features = ["unstable"] }
base64.workspace = true
cbc.workspace = true
const-oid.workspace = true
ctr.workspace = true
curve25519-dalek.workspace = true
deno_core.workspace = true
deno_error.workspace = true
ecdsa.workspace = true
ed448-goldilocks = { workspace = true }
elliptic-curve = { workspace = true, features = ["std", "pem", "arithmetic"] }
fips203 = { workspace = true, features = ["ml-kem-512", "ml-kem-768", "ml-kem-1024"] }
hmac.workspace = true
num-traits.workspace = true
ocb3.workspace = true
once_cell.workspace = true
p256 = { workspace = true, features = ["ecdh", "ecdsa"] }
p384 = { workspace = true, features = ["ecdsa"] }
p521.workspace = true
rand.workspace = true
rsa.workspace = true
serde.workspace = true
serde_bytes.workspace = true
sha1.workspace = true
sha2.workspace = true
sha3.workspace = true
signature.workspace = true
spki.workspace = true
thiserror.workspace = true
tiny-keccak = { workspace = true, features = ["k12", "kmac"] }
tokio.workspace = true
uuid.workspace = true
x25519-dalek.workspace = true
