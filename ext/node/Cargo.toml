[package]
name = "deno_node"
version = "0.193.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
readme = "README.md"
repository.workspace = true
description = "Node compatibility for Deno"

[lib]
path = "lib.rs"

[features]
sync_fs = ["deno_fs/sync_fs", "deno_package_json/sync", "node_resolver/sync"]

[dependencies]
base64.workspace = true
boxed_error.workspace = true
brotli.workspace = true
bytes.workspace = true
deno_ast = { workspace = true, features = ["type_strip"] }
deno_core.workspace = true
deno_dotenv.workspace = true
deno_error.workspace = true
deno_fs.workspace = true
deno_inspector_server.workspace = true
deno_io.workspace = true
deno_native_certs.workspace = true
deno_net.workspace = true
deno_node_crypto.workspace = true
deno_package_json.workspace = true
deno_path_util.workspace = true
deno_permissions.workspace = true
deno_process.workspace = true
deno_resolver.workspace = true
deno_signals.workspace = true
deno_tls.workspace = true
deno_whoami.workspace = true
faster-hex.workspace = true
filetime.workspace = true
hdrhistogram.workspace = true
idna.workspace = true
ipnet.workspace = true
libc.workspace = true
libnghttp2 = "1.68.0"
libz-sys.workspace = true
log.workspace = true
node_resolver.workspace = true
node_shim.workspace = true
rand.workspace = true
rustls-tokio-stream.workspace = true
rustls-webpki.workspace = true
serde.workspace = true
smallvec.workspace = true
socket2.workspace = true
sys_traits = { workspace = true, features = ["real", "winapi", "libc"] }
thiserror.workspace = true
tokio.workspace = true
tokio-eld.workspace = true
url.workspace = true
webpki-root-certs.workspace = true
zstd.workspace = true

[target.'cfg(unix)'.dependencies]
errno = "0.3.10"
nix = { workspace = true, features = ["user"] }

[build-dependencies]
cc = "1"

[target.'cfg(windows)'.dependencies]
windows-sys = { workspace = true, features = ["Win32_Networking_WinSock", "Win32_NetworkManagement_IpHelper", "Win32_System_Console", "Win32_System_ProcessStatus", "Win32_System_SystemInformation", "Win32_System_Threading"] }
deno_subprocess_windows.workspace = true
