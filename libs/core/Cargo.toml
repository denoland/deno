[package]
name = "deno_core"
version = "0.400.0"
authors.workspace = true
edition.workspace = true
license.workspace = true
readme = "README.md"
repository.workspace = true
description = "A modern JavaScript/TypeScript runtime built with V8, Rust, and Tokio"

[lib]
path = "lib.rs"

[features]
default = [
  "include_icu_data",
  "v8_use_custom_libcxx",
  "reactor-tokio",
  "v8-engine",
]
reactor-tokio = []
include_icu_data = ["deno_core_icudata"]
v8_use_custom_libcxx = ["v8/use_custom_libcxx"]
v8_enable_pointer_compression = ["v8/v8_enable_pointer_compression"]
v8_enable_v8_checks = ["v8/v8_enable_v8_checks"]
unsafe_runtime_options = []
unsafe_use_unprotected_platform = []
snapshot_flags_eager_parse = []
uv_compat_export = []
# Engine selection — exactly one of `v8-engine` or `quickjs` should be
# enabled. The `v8-engine` feature pulls in the rusty_v8 crate and is the
# historical default; `quickjs` swaps to the QuickJS-ng-backed compat
# layer. Internally, deno_core's source `use v8::*` resolves to whichever
# crate is aliased as `v8` in lib.rs (see the `extern crate ... as v8`
# block there).
v8-engine = ["dep:v8", "serde_v8/v8-engine"]
quickjs = ["dep:qjs_v8_compat", "serde_v8/quickjs"]

[dependencies]
anyhow.workspace = true
az = "1.2.1"
bincode.workspace = true
bit-set.workspace = true
bit-vec.workspace = true
boxed_error.workspace = true
bytes.workspace = true
capacity_builder = "0.5.0"
cooked-waker.workspace = true
deno_core_icudata = { workspace = true, optional = true }
deno_error = { workspace = true, features = ["serde_json", "serde", "url", "tokio"] }
deno_ops.workspace = true
deno_path_util.workspace = true
deno_unsync = { workspace = true, features = ["tokio"] }
futures.workspace = true
indexmap.workspace = true
inventory = "0.3.21"
libc.workspace = true
parking_lot.workspace = true
percent-encoding.workspace = true
pin-project.workspace = true
qjs_v8_compat = { workspace = true, optional = true }
serde.workspace = true
serde_json = { workspace = true, features = ["float_roundtrip", "preserve_order"] }
serde_v8 = { workspace = true }
smallvec.workspace = true
sourcemap.workspace = true
static_assertions.workspace = true
sys_traits = { workspace = true, features = ["real"] }
thiserror.workspace = true
tokio.workspace = true
url.workspace = true
v8 = { workspace = true, optional = true }
wasm_dep_analyzer = "0.4.0"

[target.'cfg(windows)'.dependencies]
windows-sys.workspace = true

[dev-dependencies]
bencher.workspace = true
criterion.workspace = true
deno_ast.workspace = true
fastrand.workspace = true
paste.workspace = true
pretty_assertions.workspace = true
rstest.workspace = true
twox-hash.workspace = true
unicycle = "0.10.2"

[[bench]]
name = "ops_sync"
path = "benches/ops/sync.rs"
harness = false
required-features = ["unsafe_runtime_options"]

[[bench]]
name = "ops_async"
path = "benches/ops/async.rs"
harness = false
required-features = ["unsafe_runtime_options"]

[[bench]]
name = "opset"
path = "benches/ops/opset.rs"
harness = false

[[bench]]
name = "arena"
path = "benches/infra/arena.rs"
harness = false

[[bench]]
name = "snapshot"
path = "benches/snapshot/snapshot.rs"
harness = false
