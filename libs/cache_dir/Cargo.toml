[package]
name = "deno_cache_dir"
version = "0.36.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Cache directory logic used in Deno"

[lib]
path = "./lib.rs"

[features]
default = ["file_fetcher"]
file_fetcher = ["async-trait", "base64", "cache_control", "chrono", "data-url", "http"]
sync = []

[dependencies]
async-trait = { workspace = true, optional = true }
base32.workspace = true
base64 = { workspace = true, optional = true }
boxed_error.workspace = true
cache_control = { workspace = true, optional = true }
# Note: Do not use the "clock" feature of chrono, as it links us to CoreFoundation on macOS.
chrono = { workspace = true, default-features = false, features = ["std"], optional = true }
data-url = { workspace = true, optional = true }
deno_error = { workspace = true, features = ["url"] }
deno_maybe_sync.workspace = true
deno_media_type.workspace = true
deno_path_util.workspace = true
http = { workspace = true, optional = true }
indexmap = { workspace = true, features = ["serde"] }
log.workspace = true
once_cell.workspace = true
parking_lot.workspace = true
serde.workspace = true
serde_json = { workspace = true, features = ["preserve_order"] }
sha2.workspace = true
sys_traits.workspace = true
thiserror.workspace = true
url = { workspace = true, features = ["serde"] }

[dev-dependencies]
pretty_assertions.workspace = true
sys_traits = { workspace = true, features = ["memory", "real", "getrandom", "libc", "winapi"] }
tempfile.workspace = true
tokio = { workspace = true, features = ["rt", "macros"] }
